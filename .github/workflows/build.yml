name: Build & Deploy SeedM Releases

on:
  # 수동 실행 버튼 (Actions 탭에서 Run workflow)
  workflow_dispatch:
  # 매일 자동 (UTC 기준 → 한국시간 09:10 / 13:10 / 18:10)
  schedule:
    - cron: "10 0 * * *"
    - cron: "10 4 * * *"
    - cron: "10 9 * * *"

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 실행 (중복 배포 방지)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 서비스계정 키 기록 (시크릿 → 파일)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CREDENTIALS" > credentials/google_credentials.json

      - name: 페이지 빌드 (시트 읽기 + 앨범아트 다운로드 + 정리)
        run: python build.py

      - name: Pages 아티팩트 업로드 (website 폴더)
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
